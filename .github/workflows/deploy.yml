name: Deploy backend

# Деплой бэкенда: код заливается на сервер по SSH (rsync), затем разворачивается
# через Docker. Серверу НЕ нужен доступ к GitHub и git-репозиторий — файлы
# отправляются прямо с раннера.
#
# Требуются секреты репозитория (Settings → Secrets and variables → Actions):
#   SSH_HOST       — адрес сервера (IP или домен), напр. 213.155.23.198
#   SSH_USERNAME   — пользователь SSH
#   SSH_PASSWORD   — пароль пользователя SSH
#   SSH_PORT       — порт SSH (необязательно, по умолчанию 22)
#   PROJECT_PATH   — путь к каталогу проекта на сервере (где docker-compose.yml)
#
# На сервере должны быть установлены Docker + Docker Compose v2, а в PROJECT_PATH
# заранее лежать рабочий .env (он не перезаписывается).

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-backend
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Upload code to server (rsync over SSH)
        run: |
          sudo apt-get update
          sudo apt-get install -y rsync sshpass
          sshpass -p "${{ secrets.SSH_PASSWORD }}" rsync -az --delete \
            --exclude '.git' \
            --exclude '.github' \
            --exclude '.env' \
            --exclude 'storage' \
            --exclude 'vendor' \
            --exclude 'node_modules' \
            -e "ssh -o StrictHostKeyChecking=no -p ${{ secrets.SSH_PORT || 22 }}" \
            ./ "${{ secrets.SSH_USERNAME }}@${{ secrets.SSH_HOST }}:${{ secrets.PROJECT_PATH }}/"

      - name: Deploy (Docker) over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          password: ${{ secrets.SSH_PASSWORD }}
          port: ${{ secrets.SSH_PORT || 22 }}
          command_timeout: 30m
          script: |
            set -euo pipefail

            cd "${{ secrets.PROJECT_PATH }}"

            echo "==> Пересобираем и поднимаем контейнеры"
            docker compose up -d --build --remove-orphans

            echo "==> Ждём готовности БД"
            sleep 10

            echo "==> Зависимости (vendor — именованный volume)"
            docker compose exec -T app composer install \
              --no-interaction --prefer-dist --optimize-autoloader --no-dev

            echo "==> Миграции и кеши"
            docker compose exec -T app php artisan migrate --force
            docker compose exec -T app php artisan storage:link || true
            docker compose exec -T app php artisan optimize:clear
            docker compose exec -T app php artisan config:cache
            docker compose exec -T app php artisan view:cache

            echo "==> Чистим неиспользуемые образы"
            docker image prune -f

            echo "==> Готово"
