name: Deploy backend

# Сборка образа в CI и публикация в Docker Hub, затем сервер по SSH тянет образ
# и поднимает его через Docker. Код «запечён» в образ — заливать исходники на
# сервер не нужно.
#
# Требуются секреты репозитория (Settings → Secrets and variables → Actions):
#   DOCKERHUB_USERNAME — логин Docker Hub (напр. alexhcjp)
#   DOCKERHUB_TOKEN    — access token Docker Hub (Account Settings → Security)
#   SSH_HOST           — адрес сервера, напр. 213.155.23.198
#   SSH_USERNAME       — пользователь SSH
#   SSH_PASSWORD       — пароль пользователя SSH
#   SSH_PORT           — порт SSH (необязательно, по умолчанию 22)
#   PROJECT_PATH       — путь к каталогу проекта на сервере (где docker-compose.yml)
#
# На сервере должны быть: Docker + Docker Compose v2 и рабочий .env в PROJECT_PATH.

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-backend
  cancel-in-progress: false

env:
  IMAGE: alexhcjp/megaladon_back

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE }}:latest
            ${{ env.IMAGE }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Sync compose & nginx config to server
        run: |
          sudo apt-get update
          sudo apt-get install -y rsync sshpass
          sshpass -p "${{ secrets.SSH_PASSWORD }}" rsync -az \
            -e "ssh -o StrictHostKeyChecking=no -p ${{ secrets.SSH_PORT || 22 }}" \
            docker-compose.yml docker \
            "${{ secrets.SSH_USERNAME }}@${{ secrets.SSH_HOST }}:${{ secrets.PROJECT_PATH }}/"

      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          password: ${{ secrets.SSH_PASSWORD }}
          port: ${{ secrets.SSH_PORT || 22 }}
          command_timeout: 30m
          script: |
            set -euo pipefail

            cd "${{ secrets.PROJECT_PATH }}"

            echo "==> Логинимся в Docker Hub (приватный образ)"
            echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login \
              -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin

            export APP_IMAGE="alexhcjp/megaladon_back:${{ github.sha }}"

            echo "==> Тянем образ и поднимаем контейнеры"
            docker compose pull
            docker compose up -d --no-build --remove-orphans

            echo "==> Ждём готовности БД"
            sleep 10

            echo "==> Миграции и кеши"
            docker compose exec -T app php artisan migrate --force
            docker compose exec -T app php artisan storage:link || true
            docker compose exec -T app php artisan optimize:clear
            docker compose exec -T app php artisan config:cache
            docker compose exec -T app php artisan view:cache

            echo "==> Чистим неиспользуемые образы"
            docker image prune -f

            echo "==> Готово"
