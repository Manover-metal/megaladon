services:
  app:
    image: ${APP_IMAGE:-alexhcjp/megaladon_back:latest}
    build:
      context: .
      dockerfile: Dockerfile
    container_name: megaladon_app
    restart: unless-stopped
    volumes:
      - app_code:/var/www
      - ./storage:/var/www/storage
    env_file:
      - path: .env
        required: false
    networks:
      - megaladon
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started

  nginx:
    image: nginx:1.25-alpine
    container_name: megaladon_nginx
    restart: unless-stopped
    ports:
      - "8000:80"
    volumes:
      - app_code:/var/www
      - ./storage:/var/www/storage
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    networks:
      - megaladon
    depends_on:
      - app

  db:
    image: mysql:8.0
    container_name: megaladon_db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${DB_DATABASE:-megaladon}
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-secret}
      MYSQL_PASSWORD: ${DB_PASSWORD:-secret}
      MYSQL_USER: ${DB_USERNAME:-megaladon}
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 --silent"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 20s
    networks:
      - megaladon

  redis:
    image: redis:7-alpine
    container_name: megaladon_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    networks:
      - megaladon

networks:
  megaladon:
    driver: bridge

volumes:
  db_data:
  app_code:
