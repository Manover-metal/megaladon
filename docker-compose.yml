services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: megaladon_app
    restart: unless-stopped
    volumes:
      - .:/var/www
      - vendor:/var/www/vendor
      - ./storage:/var/www/storage
    env_file:
      - path: .env
        required: false
    networks:
      - megaladon
    depends_on:
      - db
      - redis

  nginx:
    image: nginx:1.25-alpine
    container_name: megaladon_nginx
    restart: unless-stopped
    ports:
      - "8000:80"
    volumes:
      - .:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    networks:
      - megaladon
    depends_on:
      - app

  db:
    image: mysql:8.0
    container_name: megaladon_db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${DB_DATABASE:-megaladon}
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-secret}
      MYSQL_PASSWORD: ${DB_PASSWORD:-secret}
      MYSQL_USER: ${DB_USERNAME:-megaladon}
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - megaladon

  redis:
    image: redis:7-alpine
    container_name: megaladon_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    networks:
      - megaladon

networks:
  megaladon:
    driver: bridge

volumes:
  db_data:
  vendor:
